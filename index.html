<script id="learning-engine">
function createQuestionState(questionId){return{questionId,remainingSeconds:30,hintVisible:false,answered:false,usedHint:false}}
function tickQuestionState(state){if(state.answered||state.hintVisible)return state;const n=Math.max(0,state.remainingSeconds-1);return{...state,remainingSeconds:n,hintVisible:n===0,usedHint:n===0}}
function answerQuestionState(state,isCorrect){if(state.answered)return state;return{...state,answered:true,isCorrect}}
function advanceQuestionState(nextQuestionId){return createQuestionState(nextQuestionId)}
function nextWeakLevel(current,correct,usedHint){if(correct&&!usedHint)return Math.max(0,current-1);if(correct)return current;return current+1}
function isUnitCleared(correctCount,totalCount){return totalCount>0&&correctCount/totalCount>=.7}
</script>

  out.push(q);
 }return out;
}
const QUESTIONS=buildQuestions();
const STORE="shakai_master_v1";
const DEFAULT={cleared:[],weak:{},attempts:0,correct:0,streak:0,lastDate:"",history:[]};
function loadStore(){try{return{...DEFAULT,...JSON.parse(localStorage.getItem(STORE)||"{}")}}catch{return{...DEFAULT}}}
let data=loadStore(),currentSubject=null,currentUnit=null,deck=[],qIndex=0,results=[],qState=null,hintTimerId=null,sessionType="unit";
function save(){localStorage.setItem(STORE,JSON.stringify(data))}
function show(id){stopHintTimer();document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));document.getElementById(`screen-${id}`).classList.add("active");scrollTo(0,0)}
function subjectOf(id){return SUBJECTS.find(s=>s.id===id)}
function updateStreak(){const t=new Date().toDateString(),y=new Date(Date.now()-86400000).toDateString();if(data.lastDate!==t){data.streak=data.lastDate===y?data.streak+1:1;data.lastDate=t;save()}document.getElementById("streak").textContent=`🔥 ${data.streak}日連続`}
function renderHome(){updateStreak();const p=Math.round(data.cleared.length/UNITS.length*100);document.getElementById("overall-pct").textContent=p+"%";document.getElementById("overall-fill").style.width=p+"%";document.getElementById("overall-text").textContent=`${data.cleared.length}/${UNITS.length}単元クリア`;document.getElementById("subject-list").innerHTML=SUBJECTS.map(s=>`<button class="card subject" onclick="openSubject('${s.id}')"><span class="icon" style="background:${s.color}22">${s.emoji}</span><span><h3>${s.name}</h3><p>${s.desc}</p></span><span class="arrow">›</span></button>`).join("")}
function goHome(){show("home");renderHome()}
function openSubject(id){currentSubject=subjectOf(id);document.getElementById("units-title").textContent=`${currentSubject.emoji} ${currentSubject.name}`;document.getElementById("units-sub").textContent=currentSubject.desc;document.getElementById("unit-list").innerHTML=UNITS.filter(u=>u.subjectId===id).map((u,i)=>`<button class="card unit ${data.cleared.includes(u.id)?"done":""}" onclick="startUnit('${u.id}')"><span class="unit-num">${data.cleared.includes(u.id)?"✓":i+1}</span><span class="grow"><b>${u.name}</b><div class="small">${u.level}・5問</div></span><span>›</span></button>`).join("");show("units")}
function startUnit(id){currentUnit=UNITS.find(u=>u.id===id);currentSubject=subjectOf(currentUnit.subjectId);deck=shuffle(QUESTIONS.filter(q=>q.unitId===id)).slice(0,5);beginSession("unit")}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function beginSession(type){sessionType=type;qIndex=0;results=[];show("question");loadQuestion()}
function startDaily(){const weakIds=Object.entries(data.weak).filter(([,v])=>v>0).map(([id])=>id);const pool=[...QUESTIONS.filter(q=>weakIds.includes(q.id)),...shuffle(QUESTIONS)];deck=[...new Map(pool.map(q=>[q.id,q])).values()].slice(0,5);currentUnit=null;currentSubject={name:"今日の10分",emoji:"⏱"};beginSession("daily")}
function startWeak(){const pool=QUESTIONS.filter(q=>(data.weak[q.id]||0)>0).sort((a,b)=>(data.weak[b.id]||0)-(data.weak[a.id]||0));if(!pool.length){alert("苦手問題はまだありません。まず今日の学習に挑戦しよう。");return}deck=pool.slice(0,10);currentUnit=null;currentSubject={name:"苦手特訓",emoji:"🎯"};beginSession("weak")}
function showShizuoka(){show("shizuoka")}
function startMiniMock(){deck=balanced(10);currentUnit=null;currentSubject={name:"静岡県ミニ模試",emoji:"🗻"};beginSession("mock")}
function startFullMock(){deck=balanced(25);currentUnit=null;currentSubject={name:"50点チャレンジ",emoji:"📝"};beginSession("full")}
function balanced(count){const each=Math.floor(count/4),arr=[];SUBJECTS.forEach((s,i)=>arr.push(...shuffle(QUESTIONS.filter(q=>q.subjectId===s.id&&q.level!=="基礎")).slice(0,each+(i<count%4?1:0))));return shuffle(arr)}
function loadQuestion(){const q=deck[qIndex];qState=createQuestionState(q.id);document.getElementById("q-count").textContent=`${qIndex+1}/${deck.length}`;document.getElementById("q-progress").style.width=`${qIndex/deck.length*100}%`;document.getElementById("q-field").textContent=`${subjectOf(q.subjectId).emoji} ${subjectOf(q.subjectId).name}`;document.getElementById("q-level").textContent=q.level;document.getElementById("q-prompt").textContent=q.prompt;document.getElementById("q-diagram").innerHTML=makeDiagram(q);renderAnswer(q);document.getElementById("hint-box").classList.remove("show");document.getElementById("hint2-text").textContent="";document.getElementById("hint2-btn").style.display="block";document.getElementById("feedback").className="feedback";document.getElementById("next-btn").style.display="none";renderTimer();startHintTimer()}
function makeDiagram(q){
 if(q.subjectId==="geography")return`<div class="diagram" onclick="enlarge(this.innerHTML)"><svg viewBox="0 0 320 105" aria-label="地図資料の読み方"><path d="M38 38l24-19 37 5 19 23-15 29-39 10-30-20zM157 18l42 7 31 24-17 29-43 8-28-24zM249 30l31-8 20 24-8 37-30 7-22-27z" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/><path d="M24 93h275" stroke="#64748b"/><text x="19" y="15" font-size="12">位置 → 気候 → 産業 → 人々の生活</text><text x="91" y="102" font-size="10">方位・縮尺・凡例を先に確認</text></svg><div class="small">タップで拡大</div></div>`;
 if(q.subjectId==="history")return`<div class="diagram"><b>年表の読み方</b><br><span class="small">時代を決める → 前後の出来事を並べる → 原因と結果を結ぶ</span><div style="margin-top:9px">古代 ─ 中世 ─ 近世 ─ 近代 ─ 現代</div></div>`;
 if(q.subjectId==="civics")return`<div class="diagram"><b>制度を「役割」で整理</b><br><span class="small">国会：立法　内閣：行政　裁判所：司法<br>国民は選挙や世論を通して政治に参加する</span></div>`;
 if(q.subjectId==="sources")return`<div class="diagram"><b>資料読解の4手順</b><br><span class="small">①題名　②単位・凡例　③最大・最小　④変化と理由</span>${q.type==="number"?'<div style="margin-top:8px">貿易収支 ＝ 輸出額 − 輸入額</div>':""}</div>`;
 return"";
}
function enlarge(html){document.getElementById("diagram-large").innerHTML=html;document.getElementById("diagram-modal").classList.add("show")}
function renderAnswer(q){const a=document.getElementById("answer-area");if(q.type==="choice")a.innerHTML=`<div class="choices">${q.choices.map((c,i)=>`<button class="choice" onclick="answer(${i},this)">${c}</button>`).join("")}</div>`;else if(q.type==="number")a.innerHTML=`<div class="numrow"><input id="number-answer" inputmode="decimal" placeholder="数値を入力"><span>${q.unit}</span></div><button class="btn" onclick="answerNumber()">答える</button>`;else if(q.type==="order")a.innerHTML=`<div class="small">正しい順番を考えよう</div><div class="choices">${q.items.map((x,i)=>`<button class="choice" onclick="answerOrder(${i})">${i+1}. ${x}</button>`).join("")}</div><button class="btn" onclick="answerOrderDone()">この順で答える</button>`;else a.innerHTML=`<textarea id="text-answer" style="width:100%;min-height:100px;background:#071a20;color:white;border:2px solid #24434c;border-radius:13px;padding:12px" placeholder="理由を書こう"></textarea><button class="btn" onclick="answerText()">答える</button>`}
function startHintTimer(){stopHintTimer();const seconds=window.__HINT_SECONDS__??30;qState={...qState,remainingSeconds:seconds};hintTimerId=setInterval(()=>{qState=tickQuestionState(qState);renderTimer();if(qState.hintVisible){showHint();stopHintTimer()}},1000)}
function stopHintTimer(){if(hintTimerId){clearInterval(hintTimerId);hintTimerId=null}}
function renderTimer(){document.getElementById("timer-number").textContent=`${qState.remainingSeconds}秒`;document.getElementById("timer-fill").style.width=`${qState.remainingSeconds/30*100}%`;document.getElementById("hint-countdown").style.display=qState.answered||qState.hintVisible?"none":"block"}
function showHint(){qState={...qState,hintVisible:true,usedHint:true};const q=deck[qIndex];document.getElementById("hint-text").textContent=q.hint1;document.getElementById("hint-box").classList.add("show")}
function showHint2(){qState={...qState,usedHint:true};document.getElementById("hint2-text").textContent=deck[qIndex].hint2;document.getElementById("hint2-btn").style.display="none"}
function answer(chosen,btn){finishAnswer(chosen===deck[qIndex].answer,btn,deck[qIndex].choices[deck[qIndex].answer])}
function answerNumber(){const q=deck[qIndex],v=Number(document.getElementById("number-answer").value);finishAnswer(Number.isFinite(v)&&Math.abs(v-q.answer)<=q.tolerance,null,`${q.answer}${q.unit}`)}
let orderClicks=[];function answerOrder(i){if(!qState.answered&&!orderClicks.includes(i)){orderClicks.push(i);event.currentTarget.style.opacity=".45"}}
function answerOrderDone(){const q=deck[qIndex],ok=orderClicks.length===q.items.length&&orderClicks.every((x,i)=>x===i);finishAnswer(ok,null,q.items.join(" → "));orderClicks=[]}
function answerText(){const q=deck[qIndex],t=document.getElementById("text-answer").value,ok=q.required.every(k=>t.includes(k));finishAnswer(ok,null,q.model)}
function finishAnswer(ok,btn,correctAnswer){if(qState.answered)return;stopHintTimer();qState=answerQuestionState(qState,ok);renderTimer();document.querySelectorAll("#answer-area button,#answer-area input,#answer-area textarea").forEach(x=>x.disabled=true);if(btn)btn.classList.add(ok?"correct":"wrong");const q=deck[qIndex],fb=document.getElementById("feedback");fb.className=`feedback show ${ok?"ok":"ng"}`;fb.innerHTML=`<b>${ok?"⭕ 正解！":"❌ もう一度覚えよう"}</b>${ok?"":`<div>正解：${correctAnswer}</div>`}<div style="margin-top:7px">${q.explanation}</div><div class="small" style="margin-top:7px">つまずきポイント：${q.misconception}</div>`;results.push({q,ok,usedHint:qState.usedHint});data.attempts++;if(ok)data.correct++;data.weak[q.id]=nextWeakLevel(data.weak[q.id]||0,ok,qState.usedHint);data.history.push({id:q.id,ok,date:Date.now()});data.history=data.history.slice(-300);save();document.getElementById("next-btn").style.display="block";document.getElementById("next-btn").textContent=qIndex===deck.length-1?"結果を見る 📊":"次へ →"}
function nextQuestion(){if(!qState.answered)return;if(qIndex===deck.length-1){showResult();return}qIndex++;loadQuestion();scrollTo(0,0)}
function leaveQuiz(){stopHintTimer();currentSubject&&currentSubject.id?openSubject(currentSubject.id):goHome()}
function showResult(){stopHintTimer();const ok=results.filter(r=>r.ok).length,pct=Math.round(ok/results.length*100);if(currentUnit&&isUnitCleared(ok,results.length)&&!data.cleared.includes(currentUnit.id)){data.cleared.push(currentUnit.id);save()}document.getElementById("result-score").textContent=sessionType==="full"?`${ok*2}/50`:`${pct}%`;document.getElementById("result-message").textContent=pct>=80?"よく理解できています":pct>=60?"あと少しで安定します":"基礎に戻れば伸びます";document.getElementById("result-breakdown").innerHTML=SUBJECTS.map(s=>{const r=results.filter(x=>x.q.subjectId===s.id),c=r.filter(x=>x.ok).length;return`<div class="stat">${s.emoji} ${s.name}<br><b>${r.length?`${c}/${r.length}`:"-"}</b></div>`}).join("");show("result")}
function retryWrong(){const wrong=results.filter(r=>!r.ok).map(r=>r.q);if(!wrong.length){goHome();return}deck=wrong;currentUnit=null;currentSubject={name:"間違い直し",emoji:"🔁"};beginSession("retry")}
function showStats(){const rate=data.attempts?Math.round(data.correct/data.attempts*100):0,weak=Object.values(data.weak).filter(v=>v>0).length;document.getElementById("stats-content").innerHTML=`<div class="hero"><div class="score">${rate}%</div><div>累計正答率</div></div><div class="breakdown"><div class="stat"><b>${data.attempts}</b><div class="small">解いた問題</div></div><div class="stat"><b>${weak}</b><div class="small">復習待ち</div></div><div class="stat"><b>${data.cleared.length}</b><div class="small">クリア単元</div></div><div class="stat"><b>${data.streak}</b><div class="small">連続日数</div></div></div>`;show("stats")}

let canvasScrollY=0;
function lockCanvasScroll(){
 canvasScrollY=window.scrollY;
 document.body.style.overflow="hidden";
 document.body.style.position="fixed";
 document.body.style.top=`-${canvasScrollY}px`;
 document.body.style.width="100%";
}
function unlockCanvasScroll(){
 document.body.style.overflow="";
 document.body.style.position="";
 document.body.style.top="";
 document.body.style.width="";
 window.scrollTo(0,canvasScrollY);
}
document.addEventListener("touchstart",event=>{if(event.target.closest?.("canvas"))lockCanvasScroll()},{passive:true});
document.addEventListener("touchend",event=>{if(event.target.closest?.("canvas"))unlockCanvasScroll()},{passive:true});
document.addEventListener("touchcancel",event=>{if(event.target.closest?.("canvas"))unlockCanvasScroll()},{passive:true});

window.goHome = goHome;
window.openSubject = openSubject;
window.startUnit = startUnit;
window.startDaily = startDaily;
window.startWeak = startWeak;
window.startMiniMock = startMiniMock;
window.startFullMock = startFullMock;
window.answer = answer;
window.answerNumber = answerNumber;
window.answerText = answerText;
window.answerOrder = answerOrder;
window.answerOrderDone = answerOrderDone;
window.nextQuestion = nextQuestion;
window.retryWrong = retryWrong;
window.leaveQuiz = leaveQuiz;
window.showShizuoka = showShizuoka;
window.showStats = showStats;
window.enlarge = enlarge;
window.showHint2 = showHint2;

renderHome();
</script>
</body>
</html>
